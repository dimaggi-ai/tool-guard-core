name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write     # GitHub Releases
  packages: write     # ghcr.io image push

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true

      - name: Set up QEMU (for cross-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Verify build + tests pass at this tag
        run: |
          go vet ./...
          go test -count=1 ./pkg/... ./cmd/...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
